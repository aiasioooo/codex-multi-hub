<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#0a0b0f"><title>Enter Codex Relay</title><link rel="stylesheet" href="/login.css"></head>
<body>
  <main class="login-shell">
    <div class="login-graphic" aria-hidden="true"><span class="node node-a">Z</span><i></i><span class="core">H</span><i></i><span class="node node-b">A</span></div>
    <p class="eyebrow">Private observer</p>
    <h1>Codex Relay</h1>
    <p class="intro">A live window into Momo, Yuzu, and the work moving between them.</p>
    <form id="login-form">
      <label for="password">Hub password</label>
      <div class="password-row"><input id="password" name="password" type="password" inputmode="numeric" autocomplete="current-password" autofocus required><button type="submit">Enter <span>→</span></button></div>
      <p class="error" id="login-error" role="alert"></p>
    </form>
    <small>Observation only · control stays in Codex</small>
  </main>
  <script type="module" src="/login.js"></script>
</body>
</html>
